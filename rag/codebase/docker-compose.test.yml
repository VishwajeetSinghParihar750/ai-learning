services:
  test-db:
    image: postgres:15-alpine
    container_name: node-api-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-test:
    build:
      context: .
      target: test
    container_name: node-api-test-runner
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://test_user:test_password@test-db:5432/test_db
      - JWT_SECRET=test_super_secret_key_12345
      - JWT_EXPIRES_IN=24h
    depends_on:
      test-db:
        condition: service_healthy
